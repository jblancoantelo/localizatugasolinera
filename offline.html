<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sin conexión - Precios Gasolina España</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f5f5f5; color: #333; display: flex;
  align-items: center; justify-content: center; min-height: 100vh;
  padding: 2rem; text-align: center;
}
.card {
  background: #fff; border-radius: 16px; padding: 3rem 2rem;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08); max-width: 400px;
}
.icon { font-size: 4rem; margin-bottom: 1rem; }
h1 { font-size: 1.4rem; margin-bottom: 0.5rem; color: #1a73e8; }
p { color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
.btn {
  display: inline-block; padding: 0.75rem 2rem; border: none;
  border-radius: 8px; background: #1a73e8; color: #fff;
  font-size: 1rem; cursor: pointer; text-decoration: none;
}
.btn:hover { background: #1557b0; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">⛽</div>
  <h1>Sin conexión</h1>
  <p>No tienes conexión a Internet en este momento. Los datos mostrados pueden no estar actualizados.</p>
  <a class="btn" href="javascript:location.reload()">Reintentar</a>
</div>
</body>
</html>
