<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Precios Gasolina España</title>
<meta name="description" content="Precios de gasolina y gasóleo en estaciones de servicio de España">
<meta name="theme-color" content="#1a73e8">
<meta name="color-scheme" content="light">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="Gasolineras">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Gasolineras">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<link rel="icon" type="image/svg+xml" sizes="any" href="icons/icon-192.svg">
<link rel="manifest" href="manifest.json">
<meta name="msapplication-TileColor" content="#1a73e8">
<meta name="msapplication-TileImage" content="icons/icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="main">
    <div id="noProvinceMsg">
      <div class="msg-content">
        <h2>Precios Gasolina España</h2>
        <p>Selecciona una provincia para consultar los precios de combustible en sus estaciones de servicio.</p>
        <div class="msg-prov-select">
          <select id="provFilterInit"><option value="">— Selecciona una provincia —</option></select>
        </div>
      </div>
    </div>
    <div id="map" class="hide"></div>
      <div id="resizeHandle"></div>
      <div id="panel">
      <div id="controls">
        <input type="text" id="search" placeholder="Buscar localidad, calle o marca...">
        <select id="fuelFilter"><option value="">Combustible</option></select>
        <select id="provFilter"><option value="">Provincia</option></select>
        <select id="locFilter"><option value="">Localidad</option></select>
      <div id="brandFilterWrap">
        <button id="brandFilterBtn">Marcas</button>
        <div id="brandFilterDropdown"></div>
      </div>
      <input type="number" id="maxDistance" min="1" placeholder="Dist. máx (km)" title="Filtrar por distancia máxima desde tu posición">
      <select id="pageSize">
        <option value="50">50</option>
        <option value="200">200</option>
        <option value="300">300</option>
        <option value="500">500</option>
        <option value="0">Todos</option>
      </select>
      <button id="geolocBtn">📍</button>
      <span id="posInfo"></span>
      <select id="mapStyle">
        <option value="street">Calle</option>
        <option value="satellite">Satélite</option>
        <option value="standard">Estándar</option>
        <option value="cycling">Ciclismo</option>
      </select>
      <button id="configToggleBtn" title="Configuración">⚙️</button>
      <button id="favToggleBtn" title="Favoritos">☆</button>
      <button id="resetFiltersBtn" title="Limpiar filtros">✕</button>
      <div id="viewBtns">
        <button data-mode="normal" class="active" title="Completa">⊞</button>
        <button data-mode="map" title="Solo mapa">🗺</button>
        <button data-mode="table" title="Solo tabla">☰</button>
      </div>
      <div id="legend"><span><span class="dot g"></span> &lt;1.50</span><span><span class="dot o"></span> 1.50–1.70</span><span><span class="dot r"></span> &gt;1.70</span></div>
    </div>
    <div id="configPanel">
      <div class="config-section">
        <h4>Cache</h4>
        <div id="cacheInfo" style="font-size:0.78rem;color:#666;margin-bottom:0.3rem;"></div>
        <div id="provCacheInfo" style="font-size:0.78rem;color:#888;margin-bottom:0.3rem;word-break:break-all;"></div>
        <label><input type="number" id="cacheTtl" min="0" value="12"> horas</label>
        <button id="clearCacheBtn">🗑 Limpiar</button>
      </div>
      <div class="config-section">
        <h4>Descuentos por marca</h4>
        <div id="discountList"></div>
        <button id="addDiscountBtn">+ Añadir marca</button>
      </div>
      <datalist id="brandOptions"></datalist>
    </div>
    <div id="detail"></div>
    <div id="tableWrap"><table id="table"><thead><tr>
      <th data-col="Rótulo">Marca<span class="arrow"></span></th>
      <th data-col="Precio">Precio<span class="arrow"></span></th>
      <th data-col="Combustible">Combustible<span class="arrow"></span></th>
      <th data-col="Provincia">Provincia<span class="arrow"></span></th>
      <th data-col="Localidad">Localidad<span class="arrow"></span></th>
      <th data-col="Dirección">Calle<span class="arrow"></span></th>
      <th data-col="Distancia">Distancia<span class="arrow"></span></th>
    </tr></thead><tbody></tbody></table></div>
    <div id="info"><span id="infoText">Cargando datos...</span><span id="pageNav"><button id="prevPage">◀</button><span id="pageInfo"></span><button id="nextPage">▶</button></span></div>
  </div>
</div>
<script src="js/state.js"></script>
<script src="js/helpers.js"></script>
<script src="js/storage.js"></script>
<script src="js/map.js"></script>
<script src="js/table.js"></script>
<script src="js/controls.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script>
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
